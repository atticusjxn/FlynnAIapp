name: FlynnAI
options:
  bundleIdPrefix: com.flynnai
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  findCarthageFrameworks: false

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_LANGUAGE: en
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

configFiles:
  Debug: FlynnAI/Config/Debug.xcconfig
  Release: FlynnAI/Config/Release.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  FacebookSDK:
    url: https://github.com/facebook/facebook-ios-sdk
    from: "17.0.0"

targets:
  FlynnAI:
    type: application
    platform: iOS
    sources:
      - path: FlynnAI
        excludes:
          - "**/*.md"
          - "Config/Secrets.local.xcconfig"
          - "Config/Secrets.local.xcconfig.example"
    resources:
      - path: FlynnAI/Resources
    info:
      path: FlynnAI/Config/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: FlynnAI
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "70"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - flynnai
            CFBundleURLName: com.flynnai.app.native
          - CFBundleURLSchemes:
              - fb885850801136212
        UIAppFonts:
          - SpaceGrotesk-Bold.ttf
          - SpaceGrotesk-SemiBold.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
        NSCalendarsFullAccessUsageDescription: "Flynn adds your confirmed bookings to your calendar so you never miss a job."
        NSUserNotificationUsageDescription: "Flynn notifies you when a missed call is captured or you're running low on AI minutes."
        NSMicrophoneUsageDescription: "Flynn needs your microphone to let you hear and talk to the AI receptionist demo."
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        FLYNN_API_BASE_URL: $(FLYNN_API_BASE_URL)
        FacebookAppID: $(FACEBOOK_APP_ID)
        FacebookClientToken: $(FACEBOOK_CLIENT_TOKEN)
        FacebookDisplayName: Flynn
        FacebookAdvertiserIDCollectionEnabled: true
        FacebookAutoLogAppEventsEnabled: true
        LSApplicationQueriesSchemes:
          - fbapi
          - fb-messenger-share-api
          - fbauth2
        NSUserTrackingUsageDescription: "FlynnAI uses this identifier to measure ad performance and show you more relevant ads."
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: v9wttpbfk9.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flynnai.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "70"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_TEAM: "69T5H7R46N"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UIRequiresFullScreen: YES
    dependencies:
      - package: Supabase
        product: Supabase
      - package: FacebookSDK
        product: FacebookCore
    scheme:
      storeKitConfiguration: FlynnAI/Resources/FlynnAI.storekit
