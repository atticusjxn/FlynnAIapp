name: FlynnDesktop
options:
  bundleIdPrefix: com.flynnai
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  indentWidth: 4
  tabWidth: 4

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 69T5H7R46N

targets:
  FlynnDesktop:
    type: application
    platform: macOS
    sources:
      - path: FlynnDesktop
        excludes:
          - "**/*.md"
    resources:
      - path: FlynnDesktop/Resources
    info:
      path: FlynnDesktop/Resources/Info.plist
      properties:
        CFBundleName: Flynn
        CFBundleDisplayName: Flynn
        CFBundleIdentifier: com.flynnai.desktop
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundleIconFile: AppIcon
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.productivity
        LSUIElement: true
        NSCalendarsUsageDescription: "Flynn reads your calendar to suggest open times in reply drafts."
        NSAppleEventsUsageDescription: "Flynn uses Accessibility to read and insert text in your conversations."
        NSContactsUsageDescription: "Flynn may read contact names to personalise drafts."
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        ATSApplicationFontsPath: Fonts
    entitlements:
      path: FlynnDesktop/Resources/FlynnDesktop.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.personal-information.calendars: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flynnai.desktop
        INFOPLIST_FILE: FlynnDesktop/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FlynnDesktop/Resources/FlynnDesktop.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
      - package: Supabase
        product: Supabase

  FlynnDesktopTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - FlynnDesktopTests
    dependencies:
      - target: FlynnDesktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flynnai.desktop.tests
