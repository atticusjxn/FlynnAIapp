<!doctype html><html><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  html,body { width:760px; height:1646px; background:#F4E6CE; }
  body { font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; }
  .phone { position:absolute; left:10px; width:740px; top:10px; height:1626px;
    background:#111113; border-radius:167px; padding:13px; box-shadow:0 34px 68px -18px rgba(20,14,10,.4), 0 8px 22px -6px rgba(20,14,10,.28); }
  .screen { width:100%; height:100%; border-radius:145px; overflow:hidden; position:relative; }
  .lockbg { position:absolute; inset:0; background:
    radial-gradient(120% 90% at 15% 0%, #ffb27a 0%, transparent 55%),
    radial-gradient(120% 100% at 85% 100%, #3BA8A8 0%, transparent 60%),
    linear-gradient(160deg, #2b2320 0%, #171310 60%, #0d0b09 100%); }
  .dynamic-island { position:absolute; left:50%; transform:translateX(-50%); top:2.6%; width:27%; height:3.4%;
    min-height:16px; background:#000; border-radius:999px; z-index:40; }
  .status { position:absolute; top:0; left:0; right:0; height:7.4%; display:flex; align-items:center;
    justify-content:space-between; padding:0 7.5%; font-weight:700; font-size:20px; z-index:30; color:#fff; }
  .status .sysicons { display:flex; align-items:center; gap:8px; font-size:16px; }
  .status .batt { width:25px; height:13px; border:2px solid #fff; border-radius:4px; position:relative; opacity:.95; }
  .status .batt:after { content:''; position:absolute; inset:2px; right:6px; background:#fff; border-radius:1px; }
  .callbar { position:absolute; top:9.6%; left:8%; right:8%; z-index:35; background:#2FBD5A;
    border-radius:13px; padding:12px 15px; display:flex; align-items:center; justify-content:center;
    gap:8px; color:#fff; font-weight:700; font-size:19px; box-shadow:0 6px 16px -4px rgba(0,0,0,.35); }
  .callbar .dot { width:8px; height:8px; border-radius:50%; background:#fff; opacity:.92; }
  .lockdate { position:absolute; top:15.5%; left:0; right:0; text-align:center; z-index:10;
    color:rgba(255,255,255,.85); font-weight:600; font-size:23px; }
  .locktime { position:absolute; top:18.8%; left:0; right:0; text-align:center; z-index:10;
    color:#fff; font-weight:700; font-size:110px; letter-spacing:-2px; text-shadow:0 2px 20px rgba(0,0,0,.25); }
  .notif { position:absolute; left:6.5%; right:6.5%; top:36%; z-index:20; background:rgba(40,36,32,.72);
    border-radius:24px; padding:21px 21px; display:flex; gap:14px; align-items:flex-start;
    border:1px solid rgba(255,255,255,.14); }
  .notif-icon { width:50px; height:50px; border-radius:14px; background:#2C2018; flex:none;
    display:flex; align-items:center; justify-content:center; color:#f5ebe0; font-weight:800;
    font-size:25px; position:relative; }
  .notif-dot { position:absolute; top:7px; right:9px; width:7px; height:7px; border-radius:50%; background:#FB5B1E; }
  .notif-body { flex:1; }
  .notif-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .notif-app { color:#fff; font-weight:700; font-size:19px; }
  .notif-time { color:rgba(255,255,255,.55); font-size:16px; }
  .notif-msg { color:rgba(255,255,255,.94); font-size:21px; line-height:29px; font-weight:500; }
  .notif-msg b { font-weight:700; }
</style></head><body>
  <div class="phone"><div class="screen">
    <div class="lockbg"></div>
    <div class="dynamic-island"></div>
    <div class="status"><span>9:41</span><span class="sysicons"><span>ıll</span><span>ᯤ</span><span class="batt"></span></span></div>
    <div class="callbar"><span class="dot"></span>Flynn is on the call · 0:24</div>
    <div class="lockdate">Thursday, 12 June</div>
    <div class="locktime">9:41</div>
    <div class="notif">
      <div class="notif-icon">F<span class="notif-dot"></span></div>
      <div class="notif-body">
        <div class="notif-top"><span class="notif-app">Flynn</span><span class="notif-time">now</span></div>
        <div class="notif-msg">Booked the caller in for <b>Thursday 2pm</b> — deck repaint, 14 Marine Pde.</div>
      </div>
    </div>
  </div></div>
</body></html>
