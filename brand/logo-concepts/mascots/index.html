<!doctype html>
<html><head><meta charset="utf-8"><style>
  body{font-family:-apple-system,sans-serif;background:#1c1c1e;color:#eee;margin:0;padding:24px}
  h1{font-size:20px;margin:0 0 16px}
  .grid{display:flex;flex-wrap:wrap;gap:20px}
  .item{text-align:center}
  .lab{color:#bbb;font-size:12px;margin-top:6px}
  .cell{width:150px;height:150px;border-radius:26px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .cell img{width:100%;height:100%;object-fit:contain}
  .tag{font-size:10px;color:#888}
</style></head><body>
<h1>Flynn — mascot variations</h1>
<div class="grid">
  <div class="item"><div class="cell"><img src="classic-wave__nano.png"></div><div class="lab">classic wave <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="classic-wave__recraft-svg.svg"></div><div class="lab">classic wave <span class="tag">svg</span></div></div>
  <div class="item"><div class="cell"><img src="wink-thumbsup__nano.png"></div><div class="lab">wink + thumbs <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="sidekick-point__nano.png"></div><div class="lab">sidekick point <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="dash__nano.png"></div><div class="lab">dash <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="phone-reply__nano.png"></div><div class="lab">phone reply <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="peek-bubble__nano.png"></div><div class="lab">peek bubble <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="peek-bubble__recraft-svg.svg"></div><div class="lab">peek bubble <span class="tag">svg</span></div></div>
  <div class="item"><div class="cell"><img src="bubble-head__nano.png"></div><div class="lab">bubble-head <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="bubble-head__recraft-svg.svg"></div><div class="lab">bubble-head <span class="tag">svg</span></div></div>
  <div class="item"><div class="cell"><img src="f-silhouette__nano.png"></div><div class="lab">F-body <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="f-silhouette__recraft-svg.svg"></div><div class="lab">F-body <span class="tag">svg</span></div></div>
  <div class="item"><div class="cell"><img src="minimal-head__nano.png"></div><div class="lab">minimal head <span class="tag">nano</span></div></div>
  <div class="item"><div class="cell"><img src="minimal-head__recraft-svg.svg"></div><div class="lab">minimal head <span class="tag">svg</span></div></div>
</div></body></html>
