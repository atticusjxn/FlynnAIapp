<!doctype html>
<html><head><meta charset="utf-8"><style>
  body{font-family:-apple-system,sans-serif;background:#1c1c1e;color:#eee;margin:0;padding:24px}
  h1{font-size:20px;margin:0 0 16px}
  .grid{display:flex;flex-wrap:wrap;gap:22px}
  .item{text-align:center}
  .lab{color:#ccc;font-size:12px;margin-top:6px}
  .cell{width:200px;height:200px;border-radius:36px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .cell img{width:100%;height:100%;object-fit:contain}
</style></head><body>
<h1>Flynn — cream background + message read</h1>
<div class="grid">
  <div class="item"><div class="cell"><img src="1-cream-clean.png"></div><div class="lab">1 — cream, no tail</div></div>
  <div class="item"><div class="cell"><img src="2-cream-tail.png"></div><div class="lab">2 — cream + bubble tail</div></div>
  <div class="item"><div class="cell"><img src="4-cream-tail-b.png"></div><div class="lab">4 — cream + tail (b)</div></div>
  <div class="item"><div class="cell"><img src="3-cream-bubble-body.png"></div><div class="lab">3 — body as bubble</div></div>
  <div class="item"><div class="cell"><img src="5-cream-no-hand.png"></div><div class="lab">5 — no hand + tail</div></div>
</div></body></html>
