<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, sans-serif; background:#1c1c1e; color:#eee; margin:0; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  p { color:#999; margin:0 0 20px; font-size:13px; }
  table { border-collapse:collapse; }
  th, td { padding:10px; text-align:center; }
  th { color:#aaa; font-weight:600; font-size:13px; }
  td.label { color:#ccc; font-weight:600; text-align:right; padding-right:14px; font-size:13px; }
  .cell { width:160px; height:160px; border-radius:28px; overflow:hidden; background:#fff;
          display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  .cell img { width:100%; height:100%; object-fit:contain; }
</style>
</head>
<body>
  <h1>Flynn — logo concepts</h1>
  <p>Rows = concepts · Columns = models. Recraft = editable SVG (vector). Nano Banana Pro &amp; GPT Image 2 = raster.</p>
  <table>
    <tr>
      <th></th>
      <th>Recraft V4.1 (SVG)</th>
      <th>Nano Banana Pro</th>
      <th>GPT Image 2</th>
    </tr>
    <tr>
      <td class="label">Bubble</td>
      <td><div class="cell"><img src="bubble__recraft-v4.1-vector.svg"></div></td>
      <td><div class="cell"><img src="bubble__nano-banana-pro.png"></div></td>
      <td><div class="cell"><img src="bubble__gpt-image-2.png"></div></td>
    </tr>
    <tr>
      <td class="label">Bubble (solid)</td>
      <td><div class="cell"><img src="bubble-solid__recraft-v4.1-vector.svg"></div></td>
      <td><div class="cell"><img src="bubble-solid__nano-banana-pro.png"></div></td>
      <td><div class="cell"><img src="bubble-solid__gpt-image-2.png"></div></td>
    </tr>
    <tr>
      <td class="label">Mascot</td>
      <td><div class="cell"><img src="mascot__recraft-v4.1-vector.svg"></div></td>
      <td><div class="cell"><img src="mascot__nano-banana-pro.png"></div></td>
      <td><div class="cell"><img src="mascot__gpt-image-2.png"></div></td>
    </tr>
    <tr>
      <td class="label">Mascot (wink)</td>
      <td><div class="cell"><img src="mascot-wink__recraft-v4.1-vector.svg"></div></td>
      <td><div class="cell"><img src="mascot-wink__nano-banana-pro.png"></div></td>
      <td><div class="cell"><img src="mascot-wink__gpt-image-2.png"></div></td>
    </tr>
    <tr>
      <td class="label">Monogram</td>
      <td><div class="cell"><img src="monogram__recraft-v4.1-vector.svg"></div></td>
      <td><div class="cell"><img src="monogram__nano-banana-pro.png"></div></td>
      <td><div class="cell"><img src="monogram__gpt-image-2.png"></div></td>
    </tr>
  </table>
</body>
</html>
