<!doctype html>
<html><head><meta charset="utf-8"><style>

  <div class="item"><div class="cell"><img src="thumbsup-cowlick.png"></div><div class="lab">thumbs-up + cowlick</div></div>
  <div class="item"><div class="cell"><img src="soft-F-creature.png"></div><div class="lab">soft F-creature</div></div>
  <div class="item"><div class="cell"><img src="badge-confident.png"></div><div class="lab">F-badge confident</div></div>
  <div class="item"><div class="cell"><img src="hero-pose.png"></div><div class="lab">hero pose</div></div>
  <div class="item"><div class="cell"><img src="chat-creature.png"></div><div class="lab">chat-creature</div></div>
  <div class="item"><div class="cell"><img src="peek-wink.png"></div><div class="lab">peek wink</div></div>
