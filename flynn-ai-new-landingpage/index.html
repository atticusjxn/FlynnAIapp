  <style>
    body {
      background-color: #F4E6CE;
      color: #2C2018;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ---------------------------------------------------------------
       Glassmorphic buttons.
       Translucent gradient fill + bright inner sheen along the top edge
       + hairline specular highlight + soft coloured glow. Mirrors
       FlynnGlassButton.swift in the iOS app and the CSS on the hosted
       invoice page, so all three surfaces read as one product.
       --------------------------------------------------------------- */
    .flynn-glass {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .28);
      transition: transform .16s cubic-bezier(.2, .8, .3, 1), box-shadow .16s;
    }
    /* inner sheen */
    .flynn-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(180deg,
        rgba(255, 255, 255, .42) 0%,
        rgba(255, 255, 255, .10) 42%,
        rgba(255, 255, 255, 0) 62%);
    }
    /* hairline specular highlight */
    .flynn-glass::after {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 1px;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .75), transparent);
    }
    .flynn-glass:hover { transform: translateY(-1px); }
    .flynn-glass:active { transform: translateY(0) scale(.994); }

    .flynn-glass--primary {
      background: linear-gradient(180deg, #ff8a4c 0%, #ff4500 52%, #d94e1c 100%);
      color: #fff;
      box-shadow: 0 10px 26px -6px rgba(255, 69, 0, .55), 0 2px 6px rgba(16, 24, 40, .14);
    }
    .flynn-glass--primary:hover {
      box-shadow: 0 14px 32px -6px rgba(255, 69, 0, .62), 0 3px 8px rgba(16, 24, 40, .16);
    }

    .flynn-glass--light {
      background: linear-gradient(180deg, #ffffff 0%, #f4f5f7 100%);
      color: #1A1A1A;
      border-color: rgba(16, 24, 40, .08);
      box-shadow: 0 8px 24px -8px rgba(44, 32, 24, .28), 0 1px 2px rgba(16, 24, 40, .06);
    }
    .flynn-glass--light::after { display: none; }
    .flynn-glass--light:hover {
      box-shadow: 0 12px 30px -8px rgba(44, 32, 24, .34), 0 2px 4px rgba(16, 24, 40, .08);
    }

    .flynn-glass--dark {
      background: linear-gradient(180deg, #3b3b42 0%, #1c1c21 100%);
      color: #fff;
      box-shadow: 0 10px 26px -6px rgba(0, 0, 0, .38), 0 2px 6px rgba(16, 24, 40, .18);
    }

    /* ---------------------------------------------------------------
       2026 pill language. Two moves on top of .flynn-glass:

       .flynn-pill     — fully-rounded capsule with a big soft colour
                         bloom underneath (the "lit from within" CTA).
                         Combine: `flynn-glass flynn-glass--primary flynn-pill`.
       .flynn-dock     — a dark translucent capsule dock that groups
                         several pill actions (store buttons, nav CTAs).
                         True glass: backdrop blur + saturation lift.
       --------------------------------------------------------------- */
    .flynn-pill {
      border-radius: 9999px;
    }
    .flynn-pill.flynn-glass--primary {
      /* tighter gradient + a second, wider bloom layer */
      background: linear-gradient(180deg, #ff9a5c 0%, #ff5a1f 46%, #e8420a 100%);
      box-shadow:
        0 10px 28px -6px rgba(255, 69, 0, .60),
        0 28px 72px -18px rgba(255, 69, 0, .38),
        0 2px 6px rgba(16, 24, 40, .14);
    }
    .flynn-pill.flynn-glass--primary:hover {
      box-shadow:
        0 14px 34px -6px rgba(255, 69, 0, .68),
        0 34px 88px -18px rgba(255, 69, 0, .46),
        0 3px 8px rgba(16, 24, 40, .16);
    }

    .flynn-dock {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px;
      border-radius: 9999px;
      background: rgba(24, 22, 20, .82);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .14),
        0 14px 40px -10px rgba(20, 14, 10, .55),
        0 2px 8px rgba(20, 14, 10, .28);
    }
    .flynn-dock__item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 9999px;
      color: #F7F2E9;
      font-weight: 600;
      white-space: nowrap;
      transition: background .18s, transform .16s cubic-bezier(.2, .8, .3, 1);
    }
    .flynn-dock__item:hover {
      background: rgba(255, 255, 255, .10);
      transform: translateY(-1px);
    }
    .flynn-dock__item:active {
      transform: translateY(0) scale(.98);
      background: rgba(255, 255, 255, .07);
    }
    .flynn-dock__item--accent {
      background: linear-gradient(180deg, #ff9a5c 0%, #ff5a1f 46%, #e8420a 100%);
      color: #fff;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .35),
        0 6px 18px -4px rgba(255, 69, 0, .55);
    }
    .flynn-dock__item--accent:hover {
      background: linear-gradient(180deg, #ffa76e 0%, #ff6630 46%, #ef4a10 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .35),
        0 8px 24px -4px rgba(255, 69, 0, .65);
    }
    /* Phones: the dock relaxes into a rounded stack instead of wrapping
       awkwardly mid-capsule. */
    @media (max-width: 520px) {
      .flynn-dock {
        flex-direction: column;
        align-items: stretch;
        border-radius: 30px;
        width: 100%;
        max-width: 340px;
      }
      .flynn-dock__item { justify-content: center; }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #F4E6CE;
    }

    ::-webkit-scrollbar-thumb {
      background: #FB5B1E;
      border-radius: 0px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #111111;
    }

    /* Surreal Text Selection */
    ::selection {
      background: #FB5B1E;
      color: #ffffff;
    }

    /* Blog article content. Tailwind's preflight strips default heading
       styles and the CDN build has no typography plugin, so style the
       article body explicitly here. */
    .blog-content {
      font-size: 1.125rem;
      line-height: 1.75;
      color: #374151;
    }
    .blog-content > p {
      margin-bottom: 1.5rem;
    }
    .blog-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.875rem;
      line-height: 1.2;
      color: #111111;
      margin-top: 3rem;
      margin-bottom: 1.25rem;
    }
    .blog-content h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.375rem;
      line-height: 1.3;
      color: #111111;
      margin-top: 1.75rem;
      margin-bottom: 0.75rem;
    }
    .blog-content a {
      color: #FB5B1E;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .blog-content a:hover {
      color: #111111;
    }
    .blog-content strong {
      color: #111111;
      font-weight: 700;
    }
    .blog-content ul {
      margin: 1.5rem 0;
      padding-left: 1.5rem;
      list-style: disc;
    }
    .blog-content li {
      margin-bottom: 0.5rem;
    }
    /* The first lead paragraph is already sized via utility classes. */
    .blog-content > p.text-xl {
      font-size: 1.25rem;
    }
    /* Don't let article typography invert text inside dark utility blocks
       (the Message Flynn CTA, mascot hero). These opt out via .not-prose. */
    .blog-content .not-prose h2,
    .blog-content .not-prose h3,
    .blog-content .not-prose h4 {
      color: inherit;
      margin-top: 0;
    }
    .blog-content .not-prose a {
      color: inherit;
      text-decoration: none;
    }
  </style>
