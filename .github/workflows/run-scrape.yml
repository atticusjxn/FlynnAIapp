name: Run lead scrape

on:
  workflow_dispatch:
    inputs:
      max_leads:
        description: 'Max leads to scrape (default 30)'
        required: false
        default: '30'
  schedule:
    # 22:00 UTC Sun-Thu = 08:00 AEST Mon-Fri
    - cron: '0 22 * * 0,1,2,3,4'

concurrency:
  group: gtm-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gtm-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gtm-automation/package-lock.json
      - name: Install npm deps (skip Chromium download)
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci
      - name: Locate system Chrome
        id: chrome
        run: |
          CHROME=$(which google-chrome || which google-chrome-stable || which chromium-browser || which chromium)
          echo "path=$CHROME" >> "$GITHUB_OUTPUT"
          echo "Using Chrome at: $CHROME"
          "$CHROME" --version
      - name: Run scrape
        run: npm run scrape 2>&1 | tee scrape.log
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.path }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_MAX_PER_RUN: ${{ inputs.max_leads }}
      - name: Upload scrape log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log
          path: gtm-automation/scrape.log
          retention-days: 7
