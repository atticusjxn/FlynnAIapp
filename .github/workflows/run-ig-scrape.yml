name: Run Trade IG scrape

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: 'Max IG targets to discover (default 30)'
        required: false
        default: '30'
  # Cron disabled 2026-05-09 — replaced by Claude Code routine `flynn-gtm-morning`.
  # Kept workflow_dispatch for manual fallback runs.
  # schedule:
  #   - cron: '30 20 * * *'

concurrency:
  group: gtm-ig-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gtm-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gtm-automation/package-lock.json
      - name: Install npm deps (skip Chromium download)
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci
      - name: Locate system Chrome
        id: chrome
        run: |
          CHROME=$(which google-chrome || which google-chrome-stable || which chromium-browser || which chromium)
          echo "path=$CHROME" >> "$GITHUB_OUTPUT"
          echo "Using Chrome at: $CHROME"
          "$CHROME" --version
      - name: Run IG trade scrape
        run: npm run scrape:ig-trades 2>&1 | tee ig-scrape.log
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.path }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_TRADE_MAX_PER_RUN: ${{ inputs.max_per_run }}
      - name: Upload IG scrape log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ig-scrape-log
          path: gtm-automation/ig-scrape.log
          retention-days: 7
