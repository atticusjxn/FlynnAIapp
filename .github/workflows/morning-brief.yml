name: Morning GTM Brief

on:
  # Cron disabled 2026-05-09 — replaced by Claude Code routine `flynn-gtm-morning`.
  # Kept workflow_dispatch as a manual fallback if the routine is ever down.
  # schedule:
  #   - cron: '30 21 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  brief:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gtm-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gtm-automation/package-lock.json
      - run: npm ci
      - run: npm run scrape:apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          INSTANTLY_CAMPAIGN_ID: ${{ secrets.INSTANTLY_CAMPAIGN_ID }}
      - run: npm run brief
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          INSTANTLY_CAMPAIGN_ID: ${{ secrets.INSTANTLY_CAMPAIGN_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEF_FROM_EMAIL: ${{ secrets.BRIEF_FROM_EMAIL }}
          BRIEF_TO_EMAIL: ${{ secrets.BRIEF_TO_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECAT_PROJECT_ID }}
          GOAL_PAID_CUSTOMERS: '100'
          GOAL_DEADLINE: '2026-06-30'
          GOAL_START_DATE: '2026-05-08'
          TZ: 'Australia/Sydney'
